name: Chain Reaction CI

on:
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Rename APK
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        mv "$APK_FILE" app/build/outputs/apk/debug/ChainReaction.apk

    - name: Upload to GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/debug/ChainReaction.apk"
        tag: "latest"
        name: "Latest Chain Reaction Build"
        body: "Automated build of the Chain Reaction multiplayer game."
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
